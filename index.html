<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홈런 문해력 분석 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','맑은 고딕',sans-serif;background:#F5F4F0;color:#1a1a1a;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e8e8e8;padding:14px 24px;display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:#E05A1A;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
header h1{font-size:20px;font-weight:700;color:#1a1a1a}
header .sub{font-size:14px;color:#aaa;margin-left:6px}
.layout{display:grid;grid-template-columns:190px 1fr;height:calc(100vh - 63px)}
.sidebar{background:#fff;border-right:1px solid #e8e8e8;padding:10px 6px;overflow-y:auto}
.sidebar-label{font-size:12px;color:#bbb;padding:0 8px 4px;letter-spacing:0.08em}
.sidebar-section-title{font-size:12px;font-weight:700;color:#E05A1A;padding:6px 10px 4px;letter-spacing:0.05em;text-transform:uppercase}
.stu-btn{width:100%;text-align:left;border:none;background:transparent;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:15px;color:#555;transition:all 0.15s;display:flex;align-items:center;gap:6px;margin-bottom:1px}
.stu-btn:hover{background:#FFF4EC;color:#C2440A}
.stu-btn.active{background:#FFF4EC;color:#C2440A;font-weight:600}
.avatar{width:22px;height:22px;border-radius:50%;background:#f0f0f0;color:#888;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stu-btn.active .avatar{background:#E05A1A;color:#fff}
.stu-name-wrap{display:flex;flex-direction:column;gap:0px;flex:1;min-width:0}
.stu-nm{font-size:15px;font-weight:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stu-grade-tag{font-size:13px;color:#bbb;font-weight:400}
.stu-btn.active .stu-grade-tag{color:#C2440A;opacity:0.7}
.main{padding:18px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.top-bar{display:flex;align-items:flex-end;justify-content:space-between}
.stu-name{font-size:24px;font-weight:700}
.stu-sub{font-size:14px;color:#999;margin-top:2px}
.badge{background:#FFF4EC;color:#C2440A;border:1px solid #FECDAA;border-radius:20px;padding:4px 14px;font-size:14px;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{background:#fff;border:1px solid #ebebeb;border-radius:12px;padding:14px 16px}
.card-label{font-size:14px;color:#bbb;margin-bottom:6px;font-weight:500}
.card-value{font-size:26px;font-weight:700;color:#1a1a1a}
.card-value.orange{color:#E05A1A}
.card-value.up{color:#16A34A}
.card-value.down{color:#DC2626}
.charts-row{display:grid;grid-template-columns:1.8fr 1fr;gap:12px;min-width:0}
.chart-box{background:#fff;border:1px solid #ebebeb;border-radius:12px;padding:16px;min-width:0;overflow:hidden}
.chart-title{font-size:15px;font-weight:600;color:#444;margin-bottom:4px}
.chart-sub{font-size:14px;color:#bbb;margin-bottom:12px}
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:4px;font-size:14px;color:#666}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.bottom-row{display:grid;grid-template-columns:1fr 1.9fr;gap:12px}
table.bt{width:100%;font-size:15px;border-collapse:collapse;table-layout:fixed}
table.bt th{color:#bbb;font-weight:500;padding:4px 8px;text-align:left;border-bottom:1px solid #f0f0f0;font-size:14px}
table.bt td{padding:6px 8px;color:#555;border-bottom:1px solid #f8f8f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:14px;font-weight:600}
.eval-section{background:#fff;border:1px solid #ebebeb;border-radius:12px;padding:16px}
.eval-section .chart-title{margin-bottom:14px}
.eval-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.eval-card{border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.eval-tag{font-size:14px;font-weight:700;letter-spacing:0.04em}
.eval-name{font-size:14px;color:#888;margin-top:-4px}
.eval-text{font-size:15px;line-height:1.55;color:#444}
.eval-score{font-size:20px;font-weight:700;margin-top:4px}
.oneliner{margin-top:12px;background:#F8F7F4;border-left:3px solid #E05A1A;border-radius:0 8px 8px 0;padding:10px 14px;font-size:16px;color:#444;line-height:1.6}
.oneliner strong{color:#C2440A;font-weight:600}
.rank-badge{font-size:12px;font-weight:700;padding:2px 6px;border-radius:10px;margin-left:auto;flex-shrink:0}
.rank-1{background:#FFD700;color:#7A5500}
.rank-2{background:#C0C0C0;color:#4A4A4A}
.rank-3{background:#CD7F32;color:#5A3A00}
.rank-top{background:#FFF4EC;color:#C2440A}
.rank-mid{background:#F3F4F6;color:#6B7280}
.rank-low{background:#F3F4F6;color:#9CA3AF}

@media(max-width:900px){
  .charts-row{grid-template-columns:1fr!important}
  .bottom-row{grid-template-columns:1fr!important}
  .cards{grid-template-columns:repeat(2,1fr)!important}
  .eval-grid{grid-template-columns:repeat(2,1fr)!important}
  .layout{grid-template-columns:160px 1fr}
}
@media(max-width:600px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{height:auto;border-right:none;border-bottom:1px solid #e8e8e8;display:flex;flex-wrap:wrap;gap:4px;padding:8px}
  .stu-btn{width:auto}
  .cards{grid-template-columns:repeat(2,1fr)!important}
}
</style>
</head>
<body>
<header>
  <div class="logo">홈런</div>
  <h1>문해력 분석 대시보드</h1>
  <span class="sub">전체 15명</span>

        <span id="stu-diag-badge" style="font-size:13px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid #e0e0e0;white-space:nowrap">—</span>

    </div>

      <div class="card"><div class="card-label">총 독서 기록</div><div class="card-value" id="s-books">—</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-box">
        <div class="chart-title">역량별 성장 추이</div>
        <div class="chart-sub">초기 / 중기 / 후기 평균 점수</div>
        <div id="line-legend" class="legend-row"></div>
        <div style="position:relative;width:100%;height:0;padding-bottom:45%;min-height:160px"><canvas id="lineChart" style="position:absolute;top:0;left:0;width:100%!important;height:100%!important"></canvas></div>
      </div>
      <div class="chart-box">

        <div style="position:relative;width:100%;height:0;padding-bottom:75%;min-height:180px"><canvas id="radarChart" style="position:absolute;top:0;left:0;width:100%!important;height:100%!important"></canvas></div>
      </div>
    </div>
    <div class="eval-section">
      <div class="chart-title">전문가 평가 내역 <span style="font-size:13px;color:#bbb;font-weight:400">후기 점수 기준</span></div>
      <div class="eval-grid" id="eval-grid"></div>
      <div class="oneliner" id="eval-oneliner"></div>
    </div>
    <div class="bottom-row">
      <div class="chart-box">
        <div class="chart-title">장르별 독서 분포</div>
        <div class="chart-sub" style="margin-bottom:8px">전체 기간</div>
        <div style="position:relative;height:150px"><canvas id="genreChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">최근 독서 기록</div>
        <div class="chart-sub" style="margin-bottom:8px">최근 5권</div>
        <table class="bt">
          <thead><tr>
            <th style="width:60px">날짜</th>
            <th>도서명</th>
            <th style="width:55px">장르</th>
            <th style="width:50px">점수</th>
          </tr></thead>
          <tbody id="books-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

}

const FINAL_RANK = {"김시경":3,"이다민":12,"김근주":11,"이사벨":5,"이희정":7,"엄희재":13,"윤희찬":9,"김도은":14,"최지온":2,"이채윤":15,"김윤주":1,"이수정":8,"박예준":5,"임리우":4,"박서준":10};


function rankBadgeClass(rank){
  if(rank===1) return 'rank-badge rank-1';
  if(rank===2) return 'rank-badge rank-2';
  if(rank===3) return 'rank-badge rank-3';
  if(rank<=5)  return 'rank-badge rank-top';
  if(rank<=10) return 'rank-badge rank-mid';
  return 'rank-badge rank-low';
}

function getOneLiner(name, lateScores, delta){
  const bw = lateScores['BW_점수']||0;
  const so = lateScores['SO_점수']||0;
  const ci = lateScores['CI_점수']||0;
  const hs = lateScores['HS_점수']||0;
  const gs = lateScores['GS_점수']||0;
  const rank = GROWTH_RANK[name];

  // Find strongest and weakest
  const scores = [{k:'어휘',v:bw},{k:'논리',v:so},{k:'비판',v:ci},{k:'습관',v:hs},{k:'장르',v:gs}];
  const sorted = [...scores].sort((a,b)=>b.v-a.v);
  const strong = sorted[0].k;
  const weak = sorted[sorted.length-1].k;

  const trend = delta > 5 ? '꾸준한 성장세를 보이고 있으며' : delta > 0 ? '소폭 향상되었으며' : delta > -5 ? '전반적으로 유지 수준이며' : '일부 점수 하락이 확인되었으며';
  const weakAdv = weak==='논리' ? '인과·접속 표현 연습을' : weak==='비판' ? '자기 관점 서술 확대를' : weak==='장르' ? '장르 다양성 확보를' : weak==='습관' ? '규칙적 독서 참여를' : '서술량 강화를';

  return `<strong>${name}</strong> 학생은 ${strong} 영역이 강점이며, ${trend} <strong>${weak}</strong> 영역 보완을 위해 ${weakAdv} 우선 권장합니다. (성장률 순위 <strong>${rank}위</strong> / ${STUDENTS.length}명)`;
}

function buildSidebar(){
  const el = document.getElementById('stu-list');
  // 사이드바 헤더
  const hdr = document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:4px 10px 6px;border-bottom:1px solid #f0f0f0;margin-bottom:4px';
  hdr.innerHTML='<span style="font-size:12px;color:#aaa;letter-spacing:0.05em">학생</span><span style="font-size:12px;font-weight:700;color:#E05A1A;letter-spacing:0.05em">성장률</span>';
  el.appendChild(hdr);
  STUDENTS.forEach((s,i)=>{
    const btn = document.createElement('button');
    btn.className='stu-btn'+(i===0?' active':'');
    const rank = GROWTH_RANK[s];
    const grade = GRADE_MAP[s] || '';
    btn.innerHTML=`<span class="avatar">${s.slice(0,1)}</span><span class="stu-name-wrap"><span class="stu-nm">${s}</span><span class="stu-grade-tag">${grade}</span></span><span class="${rankBadgeClass(rank)}">${rank}위</span>`;
    btn.onclick=()=>{
      document.querySelectorAll('.stu-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render(s);
    };
    el.appendChild(btn);
  });
}

let lineChart, radarChart, genreChart;

function render(name){
  const d = DATA[name];
  const ref = d.ref;
  document.getElementById('stu-title').textContent = name;
  const early = ref.initial;
  const late  = ref.final;
  const delta = ref.gap;
  const totalBooks = ref.records;

  document.getElementById('s-early').textContent = early.toFixed(1)+'점';
  document.getElementById('s-late').textContent  = late.toFixed(1)+'점';
  const dEl = document.getElementById('s-delta');
  dEl.textContent = (delta>=0?'+':'')+delta.toFixed(1)+'점';
  dEl.className = 'card-value '+(delta>1?'up':delta<-1?'down':'neutral');
  document.getElementById('s-books').textContent = totalBooks+'권';
  if(document.getElementById('stu-grade-badge')){
    document.getElementById('stu-grade-badge').textContent = ref.grade;
    const de = document.getElementById('stu-diag-badge');
    if(de){
      if(ref.group==='TOP 리더'){
        de.textContent='TOP 리더';
        de.style.color='#1B4F72'; de.style.background='#D6EAF8'; de.style.borderColor='#AED6F1';
        de.style.display='inline-block';
      } else {
        de.style.display='none';
      }
    }
  }

  // Legend
  const lg = document.getElementById('line-legend');
  lg.innerHTML = CAT_LABELS.map((l,i)=>`<span class="leg"><span class="leg-sq" style="background:${LINE_COLORS[i]}"></span>${l}</span>`).join('');

  // Line chart
  const lineDsets = CATS.map((c,i)=>({
    label: CAT_LABELS[i],
    data: PERIODS.map(p=>+(d.scores[p][c]||0).toFixed(1)),
    borderColor: LINE_COLORS[i],
    backgroundColor: LINE_COLORS[i],
    borderWidth:2, pointRadius:5, pointHoverRadius:7,
    tension:0.3, fill:false
  }));
  if(lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'),{
    type:'line',
    data:{labels:PERIODS, datasets:lineDsets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y}점`}}},
      scales:{
        y:{min:0,max:100,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#999'}},
        x:{grid:{display:false},ticks:{font:{size:11},color:'#666'}}
      }
    }
  });

  // Radar
  const radarData = CATS.map(c=>+(d.scores['후기'][c]||0).toFixed(1));
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(document.getElementById('radarChart'),{
    type:'radar',
    data:{
      labels: CAT_LABELS,
      datasets:[{label:'후기',data:radarData,borderColor:'#E05A1A',backgroundColor:'rgba(224,90,26,0.15)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#E05A1A'}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{r:{min:0,max:100,ticks:{display:false,stepSize:25},grid:{color:'rgba(0,0,0,0.08)'},pointLabels:{font:{size:10},color:'#666'}}}
    }
  });

  // Genre doughnut
  const genres = Object.keys(d.genres);
  const genreVals = genres.map(g=>d.genres[g]);
  const gColors = genres.map(g=>GENRE_COLORS[g]||'#CBD5E1');
  if(genreChart) genreChart.destroy();
  genreChart = new Chart(document.getElementById('genreChart'),{
    type:'doughnut',
    data:{labels:genres, datasets:[{data:genreVals,backgroundColor:gColors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10,padding:6,color:'#555'}},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed}권`}}}
    }
  });

  // Books table
  const tbody = document.getElementById('books-tbody');
  tbody.innerHTML='';
  d.recent.forEach(b=>{
    const s = b['최종_종합점수'];
    const bg = s>=60?'#DCFCE7':s>=40?'#FEF3C7':'#FEE2E2';
    const tc = s>=60?'#166534':s>=40?'#92400E':'#991B1B';
    const tr = document.createElement('tr');
    tr.innerHTML=`<td>${b['날짜'].slice(5)}</td><td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b['도서명']}</td><td>${b['장르']}</td><td><span class="pill" style="background:${bg};color:${tc}">${s.toFixed(1)}</span></td>`;
    tbody.appendChild(tr);
  });

  // Eval cards
  const lateScores = d.scores['후기'] || {};
  const evalGrid = document.getElementById('eval-grid');
  evalGrid.innerHTML = '';
  const evals = d.evals || {};
  const evalCfgDisplay = [
    {tag:'BW', name:'어휘·서술', bg:'#FFF4EC', tc:'#C2440A', border:'#FECDAA'},
    {tag:'SO', name:'논리·접속', bg:'#EFF6FF', tc:'#1D4ED8', border:'#BFDBFE'},
    {tag:'CI', name:'비판·추상', bg:'#F5F3FF', tc:'#6D28D9', border:'#DDD6FE'},
    {tag:'HS', name:'습관·참여', bg:'#F0FDF4', tc:'#166534', border:'#BBF7D0'},
    {tag:'GS', name:'장르·스펙트럼', bg:'#FFF7ED', tc:'#92400E', border:'#FED7AA'},
  ];
  evalCfgDisplay.forEach(cfg=>{
    const text = evals[cfg.tag] || '—';
    const card = document.createElement('div');
    card.className = 'eval-card';
    card.style.cssText = `background:${cfg.bg};border:1px solid ${cfg.border}`;
    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="eval-tag" style="color:${cfg.tc}">${cfg.tag}</span>
      </div>
      <div class="eval-name" style="color:${cfg.tc};opacity:0.75">${cfg.name}</div>
      <div style="width:100%;height:3px;background:rgba(0,0,0,0.08);border-radius:2px;margin:6px 0 8px"></div>
      <div class="eval-text">${text}</div>
    `;
    evalGrid.appendChild(card);
  });
  // 한 줄 종합 평가
  document.getElementById('eval-oneliner').innerHTML = getOneLiner(name, lateScores, delta);
}

buildSidebar();
render(STUDENTS[0]);
</script>
</body>
</html>
